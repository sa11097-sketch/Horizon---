name: Global Macro Radar

on:
  workflow_dispatch: # 保持长官随时手动手动拉闸控制

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
    # 1. 检查并拉取代码
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. 安装 Python 环境
    - name: Set up Python
      uses: actions/configure-pages@v3 # 借用官方标准容器
      uses: actions/setup-python@v4
      with:
        python-with: '3.10'

    # 3. 安装爬虫及 AI 依赖
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-generativeai

    # 4. 运行 Python 脚本（生成合并好的本地 email_content.html）
    - name: Run Radar Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python radar.py

    # 5. 🌟 终极闭环：GitHub Actions 官方直接把文件里的长信发到你的 Gmail
    - name: Send Summary Email
      uses: dawidd6/action-send-mail@v3
      with:
        # 这里配置发送方（借用你的 Gmail 通道或者任何标准的 SMTP）
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}  # 你的 Gmail 邮箱账号
        password: ${{ secrets.MAIL_PASSWORD }}  # 你的 Gmail 独立应用密码（App Password）
        subject: 【高管决策内参】全球经贸多源并网雷达日报
        to: yongren2001@gmail.com               # 接收方，依然是你的主邮箱
        from: Global Radar AI
        html_body: file://email_content.html    # 核心：直接把拼好的本地整长信倒灌发送
