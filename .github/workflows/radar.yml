name: Global Macro Radar

on:
  workflow_dispatch: # 保持随时手动拉闸控制

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
    # 1. 检查并拉取代码
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. 安装 Python 环境（已修正语法冲突）
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. 安装爬虫及 AI 依赖
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-generativeai

    # 4. 运行 Python 脚本（生成合并好的本地 email_content.html）
    - name: Run Radar Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python radar.py

    # 5. 终极闭环：GitHub Actions 官方直接把文件里的长信发到你的 Gmail
    - name: Send Summary Email
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}  # 你的 Gmail 邮箱账号
        password: ${{ secrets.MAIL_PASSWORD }}  # 你的 16 位谷歌应用密码
        subject: 【高管决策内参】全球经贸多源并网雷达日报
        to: ${{ secrets.RECEIVER_EMAIL }}               # 接收方邮箱
        from: Global Radar AI
        html_body: file://email_content.html    # 核心：直接把拼好的本地整长信倒灌发送
